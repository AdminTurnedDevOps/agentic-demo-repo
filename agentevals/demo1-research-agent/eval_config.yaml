# Evaluator stack for the web research agent.
# - tool_trajectory_avg_score: built-in, ANY_ORDER. The agent may call search
#   and page tools in different orders depending on how it plans; we only
#   require it called both at least once.
# - final_response_match_v2: built-in LLM judge. Allows paraphrase of the
#   factual answer.
# - citation_verification: custom (Python). Fetches every cited Wikipedia URL
#   and verifies the response's salient claims appear on the pages. This is
#   the signature evaluator for research agents — catches hallucinated URLs
#   AND hallucinated facts cited to real URLs.

evaluators:
  - name: tool_trajectory_avg_score
    type: builtin
    trajectory_match_type: ANY_ORDER
    threshold: 0.7

  - name: final_response_match_v2
    type: builtin
    threshold: 0.6
    judge_model: gpt-4o-mini

  - name: citation_verification
    type: code
    path: demo1-research-agent/evaluators/citation_verification.py
    threshold: 0.8
    timeout: 90
