apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-rebac-gateway
  namespace: rebac-mcp-demo
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 3000
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-rebac-backend
  namespace: rebac-mcp-demo
spec:
  mcp:
    sessionRouting: Stateful
    targets:
      - name: rebac-adapter
        static:
          host: rebac-auth-adapter.rebac-mcp-demo.svc.cluster.local
          port: 8080
          path: /mcp
          protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-rebac-route
  namespace: rebac-mcp-demo
spec:
  parentRefs:
    - name: mcp-rebac-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: mcp-rebac-backend