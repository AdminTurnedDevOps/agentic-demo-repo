apiVersion: extauth.solo.io/v1
kind: AuthConfig
metadata:
  name: abac-opa-authconfig
  namespace: abac-demo
spec:
  configs:
  - opaServerAuth:
      package: abac.http
      ruleName: allow
      serverAddr: opa.abac-demo.svc.cluster.local:8181
      options:
        returnDecisionReason: true
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: abac-ent-extauth
  namespace: abac-demo
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: abac-gateway
  traffic:
    entExtAuth:
      authConfigRef:
        name: abac-opa-authconfig
        namespace: abac-demo
