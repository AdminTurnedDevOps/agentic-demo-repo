apiVersion: v1
kind: Namespace
metadata:
  name: abac-demo
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: abac-gateway
  namespace: abac-demo
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 3000
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: abac-demo
spec:
  ai:
    provider:
      anthropic:
        model: "claude-sonnet-4-5-20250929"
  policies:
    auth:
      secretRef:
        name: anthropic-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: abac-route
  namespace: abac-demo
spec:
  parentRefs:
  - name: abac-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /v1/messages
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: anthropic
