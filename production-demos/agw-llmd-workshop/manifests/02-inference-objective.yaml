# InferenceObjective maps a workload to an InferencePool backend.
#
# This tells the Gateway API Inference Extension (and the EPP) to route
# requests to the "llmd-pool" InferencePool with default priority.
#
# Note: InferenceObjective replaced InferenceModel in gateway-api-inference-extension v1.0.0+.
# It lives in the experimental API group (x-k8s.io).

# tldr; InferenceObject is the pointer to the InferencePool

apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: llmd-model
  namespace: llmd-workshop
spec:
  # Reference to the InferencePool that serves this model
  poolRef:
    name: llmd-pool
  # Priority controls scheduling order in the EPP.
  # Higher values = higher priority. Default (unset) is treated as 0.
  # Positive values are served before default; negative values after.
  priority: 0
